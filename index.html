<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arvo&family=Lato:ital,wght@0,700;0,900;1,100;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Изменяй ширину окна браузера!</h1>
    <p style="text-align: center;">Сейчас вы видите базовую версию (Desktop).</p>

    <div class="container">
        <!-- Карточка 1 -->
        <div class="card">
            <h2>🖥️ Desktop</h2>
            <p>Я люблю простор. На больших экранах мы стоим в ряд.</p>
        </div>

        <!-- Карточка 2 -->
        <div class="card">
            <h2>📱 Tablet</h2>
            <p>На планшете мне становится тесно, и я хочу встать в столбик.</p>
        </div>

        <!-- Карточка 3 (Исчезнет на телефоне) -->
        <div class="card card-hidden">
            <h2>🚫 Mobile Hidden</h2>
            <p>На мобильном телефоне места мало, поэтому я исчезну.</p>
        </div>
    </div>

</body>
</html>
